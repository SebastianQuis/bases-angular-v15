<h3>Lista de heroes</h3>


<div *ngIf="deletedHeroe" ; else noDeleted>
  <h3>Heroe eliminado <small class="text-danger">{{ deletedHeroe }}</small></h3>
</div>

<ng-template #noDeleted>
  <h3>No ha borrado nada</h3>
</ng-template>

<button *ngIf="heroNames.length > 0" (click)="deleteHeroe()" class="btn btn-outline-danger">Borrar ultimo heroe</button>

<ul class="mt-2 list-group">
  <li class="list-group-item" *ngFor="let hero of heroNames">
    {{ hero }}
  </li>
</ul>
