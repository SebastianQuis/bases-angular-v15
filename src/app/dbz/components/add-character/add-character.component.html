<h4>Agregar personajes</h4>
<form action="" class="row">
  <input
    [(ngModel)]="character.name"
    name="name"
    type="text"
    class="form-control mb-2"
    placeholder="Nombre"
  >
  <input
    [(ngModel)]="character.power"
    name="power"
    type="number"
    class="form-control mb-2"
    placeholder="Poder"
  >
  <button class="btn btn-primary" type="submit" (click)="saveCharacter()">Agregar</button>

  <pre>{{ character | json }}</pre>
</form>
