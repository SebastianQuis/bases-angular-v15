<h4>Listado</h4>

<ul class="list-group">
  <!-- <li class="list-group-item">Goku - 100</li>
  <li class="list-group-item">Krillin - 100</li> -->

  <li class="list-group-item d-flex justify-content-between align-items-center" *ngFor="
      let character of characterList;
      let i = index
      let isFirst = first
      let isLast = last
      let isEven = even
      let isOdd = odd
    " [ngClass]="{
      'list-group-item-success': isFirst,
      'list-group-item-dark': !isFirst
    }">
    <div>
      {{ i + 1 }} {{ character.name }} - <strong>Power</strong>: {{ character.power }}
    </div>
    <div class="btn btn-danger" (click)="deleteCharacterById(i)">x</div>
  </li>
</ul>
